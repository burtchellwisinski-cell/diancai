<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #fff5f0 0%, #fff0e5 100%);
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: 120px;
  padding-bottom: calc(120px + env(safe-area-inset-bottom));
  color: #3d2c1e;
}

/* ====== Header ====== */
.header {
  background: linear-gradient(135deg, #e8452d, #f05a3e);
  color: white; text-align: center;
  padding: 16px 20px 18px;
  padding-top: calc(16px + env(safe-area-inset-top));
  border-radius: 0 0 28px 28px;
  box-shadow: 0 4px 20px rgba(232,69,45,0.25);
  position: relative;
}
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
.header .subtitle { font-size: 12px; opacity: 0.9; margin-top: 2px; }
.header .identity-badge {
  position: absolute; top: calc(12px + env(safe-area-inset-top)); right: 14px;
  background: rgba(255,255,255,0.2); border-radius: 16px;
  padding: 4px 12px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.header .admin-btn {
  position: absolute; top: calc(12px + env(safe-area-inset-top)); left: 14px;
  background: rgba(255,255,255,0.2); border-radius: 50%;
  width: 30px; height: 30px; display: none; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ====== Identity picker modal ====== */
.identity-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 16px 0; }
.identity-card {
  background: #faf7f4; border-radius: 14px; padding: 14px 8px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  border: 2px solid transparent; user-select: none;
}
.identity-card:active { transform: scale(0.95); }
.identity-card.selected { border-color: #e8452d; background: #fff8f5; }
.identity-card .id-emoji { font-size: 32px; display: block; margin-bottom: 4px; }
.identity-card .id-name { font-size: 13px; font-weight: 600; }

/* ====== Role switch ====== */
.role-bar { display: flex; justify-content: center; gap: 10px; padding: 12px 16px 0; }
.role-btn {
  padding: 9px 24px; border-radius: 20px; border: 2px solid #e8d5c8;
  background: white; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; user-select: none;
}
.role-btn.active { background: #e8452d; color: white; border-color: #e8452d; }

/* ====== Tabs ====== */
.tabs {
  display: flex; gap: 8px; padding: 10px 16px 0;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 7px 16px; border-radius: 18px;
  border: 1.5px solid #e8d5c8; background: white;
  color: #8b6f5e; font-size: 13px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; user-select: none;
}
.tab.active { background: #e8452d; color: white; border-color: #e8452d; font-weight: 600; }
.tab .count {
  display: inline-block; background: rgba(255,255,255,0.3); border-radius: 10px;
  padding: 0 5px; font-size: 11px; margin-left: 3px; min-width: 16px; text-align: center;
}
.tab.active .count { background: rgba(255,255,255,0.35); }

/* ====== Content ====== */
.content { padding: 12px 16px; max-width: 700px; margin: 0 auto; }
.category-title { font-size: 17px; font-weight: 700; margin: 8px 0 10px; padding-left: 4px; display: flex; align-items: center; gap: 6px; }
.dish-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 18px; }
.dish-card {
  background: white; border-radius: 13px; padding: 12px;
  cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.dish-card:active { transform: scale(0.97); }
.dish-card.selected { border-color: #e8452d; background: #fff8f5; box-shadow: 0 4px 16px rgba(232,69,45,0.15); }
.dish-card .dish-emoji { font-size: 28px; margin-bottom: 4px; }
.dish-card .dish-name { font-size: 14px; font-weight: 600; }
.dish-card .dish-desc { font-size: 11px; color: #9a8070; margin-top: 1px; }
.dish-card .check-mark {
  position: absolute; top: 6px; right: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #e8452d; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; opacity: 0; transform: scale(0.5); transition: all 0.2s;
}
.dish-card.selected .check-mark { opacity: 1; transform: scale(1); }
.dish-card .picker-tag {
  position: absolute; bottom: 6px; right: 6px;
  font-size: 10px; background: rgba(232,69,45,0.1); color: #e8452d;
  border-radius: 8px; padding: 1px 6px;
  display: none;
}
.dish-card.selected-other .picker-tag { display: block; }
.dish-card.selected-other { border-color: #f0c0b0; background: #fffbfa; }

/* ====== Bottom bar ====== */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
  border-radius: 20px 20px 0 0; z-index: 100;
  display: flex; align-items: center; gap: 8px;
}
.bottom-bar .preview { flex: 1; font-size: 13px; color: #8b6f5e; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.bottom-bar .count-badge {
  background: #e8452d; color: white; border-radius: 10px; padding: 2px 8px;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.btn {
  flex-shrink: 0; padding: 9px 16px; border-radius: 20px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn:active { transform: scale(0.95); opacity: 0.9; }

/* ====== Toast ====== */
.toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.78); color: white;
  padding: 10px 24px; border-radius: 20px; font-size: 14px;
  z-index: 999; pointer-events: none; opacity: 0; transition: all 0.25s;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ====== Modal ====== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: white; border-radius: 20px; width: 90%; max-width: 400px;
  max-height: 80vh; overflow-y: auto; padding: 24px 20px;
  transform: scale(0.9); transition: transform 0.25s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 19px; margin-bottom: 4px; text-align: center; }
.modal .sub { font-size: 13px; color: #9a8070; margin-bottom: 14px; text-align: center; }

/* ====== Shop modal ====== */
.shop-modal { border-radius: 20px 20px 0 0; max-height: 90vh; width: 100%; max-width: 500px; align-self: flex-end; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
.shop-overlay.show .shop-modal { transform: translateX(-50%) translateY(0); }

/* ====== Viewer ====== */
.viewer-wrap { padding: 16px 12px; max-width: 500px; margin: 0 auto; }
.viewer-status {
  text-align: center; padding: 40px 20px; color: #9a8070; font-size: 15px; line-height: 2;
}
.viewer-status .big-emoji { font-size: 56px; display: block; margin-bottom: 8px; }
.viewer-dish-list { display: flex; flex-direction: column; gap: 8px; }
.viewer-dish-item {
  background: white; border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.viewer-dish-item .vd-emoji { font-size: 32px; }
.viewer-dish-item .vd-info { flex: 1; }
.viewer-dish-item .vd-name { font-size: 16px; font-weight: 600; }
.viewer-dish-item .vd-desc { font-size: 12px; color: #9a8070; }
.viewer-dish-item .vd-by {
  font-size: 11px; background: #fff5f0; color: #e8452d;
  border-radius: 10px; padding: 2px 8px; flex-shrink: 0;
}
.viewer-summary {
  margin-top: 18px; padding: 14px; background: #fff8f5;
  border-radius: 14px; text-align: center;
  font-size: 17px; font-weight: 700; color: #e8452d;
}

/* ====== Admin panel ====== */
.admin-section { margin-bottom: 20px; }
.admin-section h4 { font-size: 15px; margin-bottom: 10px; color: #5d4037; }
.admin-input {
  width: 100%; padding: 8px 12px; border: 1.5px solid #e8d5c8;
  border-radius: 10px; font-size: 14px; margin-bottom: 8px; outline: none;
}
.admin-input:focus { border-color: #e8452d; }
.admin-row { display: flex; gap: 8px; }
.admin-row .admin-input { flex: 1; }
.admin-dish-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: #faf7f4; border-radius: 10px; margin-bottom: 6px;
  font-size: 14px;
}
.admin-dish-item .del-btn {
  margin-left: auto; width: 24px; height: 24px; border-radius: 50%;
  border: none; background: #fee; color: #e8452d; font-size: 12px; cursor: pointer;
}

@media (min-width: 600px) {
  .dish-grid { grid-template-columns: repeat(4, 1fr); }
  .header { padding-top: 20px; padding-bottom: 22px; }
}
</style>
</head>

function getMenu() {
  if (customMenu.length === 0) return DEFAULT_MENU;
  const m = JSON.parse(JSON.stringify(DEFAULT_MENU));
  for (const d of customMenu) {
    const cat = m.find(c => c.id === d.catId);
    if (cat) cat.dishes.push({ id: d.id, emoji: d.emoji, name: d.name, desc: d.desc, custom: true });
  }
  return m;
}

function buildDishMap() {
  const map = {};
  for (const cat of getMenu()) {
    for (const d of cat.dishes) {
      map[d.id] = d;
      d.category = cat.name;
      d.categoryId = cat.id;
    }
  }
  return map;
}

// ====== 我自己选的菜 ======
function getMySelected() {
  return new Set(localPicks);
}

// ====== 检查是否有未确认的改动 ======
function isDirty() {
  const confirmed = new Set(allOrders[myIdentity] || []);
  if (localPicks.size !== confirmed.size) return true;
  for (const id of localPicks) {
    if (!confirmed.has(id)) return true;
  }
  return false;
}

// ====== 所有被选的菜（合并所有人的） ======
function getAllSelected() {
  const s = new Set();
  for (const arr of Object.values(allOrders)) {
    for (const id of arr) { s.add(id); }
  }
  for (const id of localPicks) { s.add(id); }
  return s;
}

// ====== 初始化 ======
function initApp() {
  myIdentity = localStorage.getItem('diancai_identity') || '';
  if (myIdentity && !idMap[myIdentity]) myIdentity = '';

  if (!myIdentity) {
    showIdentityPicker();
  } else {
    finishInit();
  }
}

function finishInit() {
  document.getElementById('identityModal').classList.remove('show');
  document.getElementById('mainApp').style.display = '';

  const params = new URLSearchParams(window.location.search);
  roomId = params.get('room');
  role = params.get('role') === 'viewer' ? 'viewer' : 'picker';

  if (!roomId) {
    const savedRoom = localStorage.getItem('diancai_room');
    const savedRole = localStorage.getItem('diancai_role');
    if (savedRoom) roomId = savedRoom;
    if (savedRole === 'viewer') role = 'viewer';
  }
  if (!roomId) { roomId = genRoomId(); updateURL(); }

  localStorage.setItem('diancai_room', roomId);
  localStorage.setItem('diancai_role', role);

  updateIdentityUI();
  switchRole(role, true);
  loadData();
  startPolling();

  // BUG FIX: 无条件渲染 picker 菜品列表
  if (role === 'picker') {
    renderTabs();
    renderDishes();
    renderBottom();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
    });
    // 清除旧缓存
    if (typeof caches !== 'undefined') {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  }
}

// ====== 身份选择 ======
function showIdentityPicker() {
  pendingIdentity = '';
  const grid = document.getElementById('identityGrid');
  grid.innerHTML = IDENTITIES.map(i =>
    `<div class="identity-card" id="idCard_${i.id}" onclick="selectIdentity('${i.id}')">
      <span class="id-emoji">${i.emoji}</span>
      <span class="id-name">${i.id}</span>
    </div>`
  ).join('');
  updateConfirmBtn();
  document.getElementById('identityModal').classList.add('show');
  document.getElementById('mainApp').style.display = 'none';
}

function openIdentityPicker() {
  showIdentityPicker();
}

function selectIdentity(id) {
  pendingIdentity = id;
  // 更新卡片高亮
  IDENTITIES.forEach(i => {
    const el = document.getElementById('idCard_' + i.id);
    if (el) el.classList.toggle('selected', i.id === id);
  });
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirmIdentityBtn');
  if (pendingIdentity) {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  } else {
    btn.style.opacity = '0.4';
    btn.style.pointerEvents = 'none';
  }
}

function confirmIdentity() {
  if (!pendingIdentity) return;
  myIdentity = pendingIdentity;
  localStorage.setItem('diancai_identity', myIdentity);
  finishInit();
}

function updateIdentityUI() {
  const badge = document.getElementById('identityBadge');
  badge.innerHTML = `${idMap[myIdentity] || ''} ${myIdentity}`;

  const adminBtn = document.getElementById('adminBtn');
  adminBtn.style.display = myIdentity === '管理员' ? 'flex' : 'none';
}

// ====== 工具函数 ======
function genRoomId() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let id = '';
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function updateURL() {
  const url = new URL(window.location);
  url.searchParams.set('room', roomId);
  url.searchParams.set('role', role);
  window.history.replaceState({}, '', url);
}

// ====== 数据同步 ======
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadData, 2000);
}

async function loadData() {
  try {
    const res = await fetch(API + '?room_id=eq.' + roomId + '&select=dishes,custom_menu', {
      headers: { ...HEADERS, 'Prefer': 'return=minimal' },
    });
    if (!res.ok) return;
    const data = await res.json();

    const newOrders = (data.length > 0 && data[0].dishes) ? data[0].dishes : {};
    const newCustom = (data.length > 0 && data[0].custom_menu) ? data[0].custom_menu : [];

    const ordersChanged = JSON.stringify(allOrders) !== JSON.stringify(newOrders);
    const menuChanged = JSON.stringify(customMenu) !== JSON.stringify(newCustom);

    // 如果没有未确认的改动，从服务器同步当前身份的已确认选择
    if (!isDirty() && newOrders[myIdentity]) {
      localPicks = new Set(newOrders[myIdentity]);
    }

    allOrders = newOrders;
    customMenu = newCustom;
    if (menuChanged) menuVersion++;

    if (ordersChanged || menuChanged) {
      if (role === 'picker') { renderTabs(); renderDishes(); renderBottom(); }
      renderViewer();
    }
  } catch(e) {}
}

async function syncCustomMenu() {
  try {
    const check = await fetch(API + '?room_id=eq.' + roomId + '&select=dishes,custom_menu', {
      headers: { ...HEADERS, 'Prefer': 'return=minimal' },
    });
    const existing = await check.json();

    if (existing.length > 0) {
      await fetch(API + '?room_id=eq.' + roomId, {
        method: 'PATCH', headers: HEADERS,
        body: JSON.stringify({ custom_menu: customMenu, updated_at: new Date().toISOString() }),
      });
    } else {
      await fetch(API, {
        method: 'POST', headers: HEADERS,
        body: JSON.stringify({ room_id: roomId, dishes: allOrders, custom_menu: customMenu, updated_at: new Date().toISOString() }),
      });
    }
  } catch(e) {}
}

// ====== 角色切换 ======
function switchRole(newRole, skipSync) {
  role = newRole;
  document.getElementById('btnPicker').classList.toggle('active', role === 'picker');
  document.getElementById('btnViewer').classList.toggle('active', role === 'viewer');
  document.getElementById('pickerView').style.display = role === 'picker' ? '' : 'none';
  document.getElementById('viewerView').style.display = role === 'viewer' ? '' : 'none';

  if (role === 'picker') {
    document.getElementById('headerTitle').textContent = '回家点菜';
    document.getElementById('headerSub').textContent = '想吃什么点什么';
    renderTabs();
    renderDishes();
    renderBottom();
  } else {
    document.getElementById('headerTitle').textContent = '今日菜单';
    document.getElementById('headerSub').textContent = '实时更新中...';
    renderViewer();
  }

  if (!skipSync) updateURL();
}

// ====== 菜品操作 ======
function toggleDish(id) {
  if (role !== 'picker' || !myIdentity) return;
  if (localPicks.has(id)) localPicks.delete(id);
  else localPicks.add(id);
  renderTabs();
  renderDishes();
  renderBottom();
}

function confirmMyPicks() {
  if (role !== 'picker' || !myIdentity) return;
  const arr = [...localPicks];
  // 先读最新数据再写
  fetch(API + '?room_id=eq.' + roomId + '&select=dishes,custom_menu', {
    headers: { ...HEADERS, 'Prefer': 'return=minimal' },
  }).then(r => r.json()).then(data => {
    let merged = {};
    if (data.length > 0 && data[0].dishes) merged = data[0].dishes;
    merged[myIdentity] = arr;
    allOrders[myIdentity] = arr;
    if (arr.length === 0) delete allOrders[myIdentity];
    const method = data.length > 0 ? 'PATCH' : 'POST';
    const url = data.length > 0 ? API + '?room_id=eq.' + roomId : API;
    return fetch(url, {
      method, headers: HEADERS,
      body: JSON.stringify({ room_id: roomId, dishes: merged, updated_at: new Date().toISOString() }),
    });
  }).then(() => {
    renderTabs(); renderDishes(); renderBottom(); renderViewer();
    showToast('已确定菜单 ✓');
  }).catch(() => {});
}

function clearMyPicks() {
  if (role !== 'picker' || !myIdentity) return;
  if (localPicks.size === 0) return;
  localPicks.clear();
  renderTabs();
  renderDishes();
  renderBottom();
  showToast('已清空选择');
}

// ====== Picker 渲染 ======
function renderTabs() {
  const allSelected = getAllSelected();
  document.getElementById('tabs').innerHTML = getMenu().map(cat => {
    const count = cat.dishes.filter(d => allSelected.has(d.id)).length;
    return `<div class="tab ${cat.id===activeCategory?'active':''}" onclick="switchCat('${cat.id}')">
      ${cat.icon} ${cat.name} ${count>0?`<span class="count">${count}</span>`:''}
    </div>`;
  }).join('');
}

function switchCat(id) { activeCategory = id; renderTabs(); renderDishes(); }

function renderDishes() {
  const cat = getMenu().find(c => c.id === activeCategory);
  if (!cat) return;
  const mySet = getMySelected();
  const allSelected = getAllSelected();

  document.getElementById('content').innerHTML = `
    <div class="category-title"><span>${cat.icon}</span>${cat.name}</div>
    <div class="dish-grid">
      ${cat.dishes.map(d => {
        let cls = '';
        if (mySet.has(d.id)) cls = 'selected';
        else if (allSelected.has(d.id)) cls = 'selected-other';

        // 找出是谁点的
        let tag = '';
        if (allSelected.has(d.id) && !mySet.has(d.id)) {
          const who = Object.entries(allOrders).filter(([k,v]) => v.includes(d.id) && k !== myIdentity).map(([k]) => k).join(',');
          tag = `<span class="picker-tag">${who}</span>`;
        }

        return `<div class="dish-card ${cls}" onclick="toggleDish('${d.id}')">
          <div class="check-mark">✓</div>
          <div class="dish-emoji">${d.emoji}</div>
          <div class="dish-name">${d.name}</div>
          <div class="dish-desc">${d.desc}</div>
          ${tag}
        </div>`;
      }).join('')}
    </div>`;
}

function renderBottom() {
  const mySet = getMySelected();
  const arr = [...mySet];
  const dishMap = buildDishMap();
  const dirty = isDirty();
  document.getElementById('count').textContent = arr.length;
  document.getElementById('btnClear').style.display = arr.length > 0 ? '' : 'none';
  document.getElementById('btnShare').hidden = dirty;
  // 确定按钮：始终显示，有改动时亮红可点，没改动时灰色不可点
  const cfm = document.getElementById('btnConfirm');
  if (dirty) {
    cfm.style.background = '#e8452d';
    cfm.style.color = 'white';
    cfm.style.pointerEvents = 'auto';
  } else {
    cfm.style.background = '#ccc';
    cfm.style.color = '#fff';
    cfm.style.pointerEvents = 'none';
  }
  document.getElementById('preview').textContent = arr.length === 0
    ? '还没选菜呢~'
    : arr.map(id => dishMap[id]?.name || '').filter(Boolean).join('、');
}

// ====== Viewer 渲染 ======
function renderViewer() {
  const allSelected = getAllSelected();
  const statusEl = document.getElementById('viewerStatus');
  const listEl = document.getElementById('viewerDishList');
  const summaryEl = document.getElementById('viewerSummary');

  if (allSelected.size === 0) {
    statusEl.style.display = '';
    listEl.innerHTML = '';
    summaryEl.style.display = 'none';
    document.getElementById('headerSub').textContent = '实时更新中...';
    return;
  }

  statusEl.style.display = 'none';
  document.getElementById('headerSub').textContent = `共 ${allSelected.size} 道菜`;

  const dishMap = buildDishMap();
  const byCat = {};
  for (const id of allSelected) {
    const d = dishMap[id];
    if (!d) continue;
    if (!byCat[d.categoryId]) byCat[d.categoryId] = [];
    byCat[d.categoryId].push(id);
  }

  let html = '';
  for (const cat of getMenu()) {
    const ids = byCat[cat.id];
    if (!ids || ids.length === 0) continue;
    html += `<div style="font-weight:700;margin:14px 0 6px;padding-left:4px">${cat.icon} ${cat.name}（${ids.length}道）</div>`;
    for (const id of ids) {
      const d = dishMap[id];
      if (!d) continue;
      // 谁点的
      const who = Object.entries(allOrders).filter(([k,v]) => v.includes(id)).map(([k]) => idMap[k]+k).join(' ');
      html += `<div class="viewer-dish-item">
        <div class="vd-emoji">${d.emoji}</div>
        <div class="vd-info"><div class="vd-name">${d.name}</div><div class="vd-desc">${d.desc}</div></div>
        ${who ? `<span class="vd-by">${who}</span>` : ''}
      </div>`;
    }
  }
  listEl.innerHTML = html;
  summaryEl.style.display = '';
  summaryEl.innerHTML = `共 ${allSelected.size} 道菜，辛苦啦 ❤️`;
}

// ====== 分享弹窗 ======
function showShareModal() {
  const viewerUrl = new URL(window.location);
  viewerUrl.searchParams.set('role', 'viewer');
  const url = viewerUrl.toString();

  document.getElementById('modalRoomCode').textContent = roomId;
  document.getElementById('qrCode').innerHTML = '';
  document.getElementById('shareModal').classList.add('show');

  setTimeout(() => {
    if (typeof QRCode !== 'undefined') {
      new QRCode(document.getElementById('qrCode'), {
        text: url, width: 200, height: 200,
        colorDark: '#3d2c1e', colorLight: '#ffffff',
      });
    }
  }, 100);
}

function closeShareModal(e) {
  if (e && e.target !== document.getElementById('shareModal')) return;
  document.getElementById('shareModal').classList.remove('show');
}

function copyViewerLink() {
  const viewerUrl = new URL(window.location);
  viewerUrl.searchParams.set('role', 'viewer');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(viewerUrl.toString()).then(() => showToast('链接已复制！'));
  }
}

// ====== 管理员 ======
function openAdmin() {
  if (myIdentity !== '管理员') return;
  document.getElementById('adminRoomInfo').textContent = `房间：${roomId}`;
  document.getElementById('newRoomId').value = '';
  renderCustomDishesList();
  document.getElementById('adminOverlay').classList.add('show');
}

function closeAdmin(e) {
  if (e && e.target !== document.getElementById('adminOverlay')) return;
  document.getElementById('adminOverlay').classList.remove('show');
}

function addCustomDish() {
  if (myIdentity !== '管理员') return;
  const catId = document.getElementById('addCat').value;
  const emoji = document.getElementById('addEmoji').value.trim();
  const name = document.getElementById('addName').value.trim();
  const desc = document.getElementById('addDesc').value.trim();
  if (!emoji || !name) { showToast('请填写菜名和 Emoji'); return; }

  customMenu.push({ id: 'cst' + Date.now(), catId, emoji, name, desc });
  menuVersion++;
  document.getElementById('addEmoji').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addDesc').value = '';
  syncCustomMenu();
  renderCustomDishesList();
  renderTabs();
  renderDishes();
  showToast('已添加：' + name);
}

function removeCustomDish(idx) {
  if (myIdentity !== '管理员') return;
  customMenu.splice(idx, 1);
  menuVersion++;
  syncCustomMenu();
  renderCustomDishesList();
  renderTabs();
  renderDishes();
  showToast('已删除');
}

function renderCustomDishesList() {
  const el = document.getElementById('customDishesList');
  if (customMenu.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:#9a8070">暂无自定义菜品</p>';
    return;
  }
  el.innerHTML = '<h4>📝 自定义菜品</h4>' + customMenu.map((d, i) => `
    <div class="admin-dish-item">
      ${d.emoji} ${d.name} <span style="font-size:11px;color:#9a8070">${d.desc}</span>
      <button class="del-btn" onclick="removeCustomDish(${i})">✕</button>
    </div>
  `).join('');
}

function changeRoom() {
  if (myIdentity !== '管理员') return;
  const newId = document.getElementById('newRoomId').value.trim().toUpperCase();
  if (newId.length < 4) { showToast('请输入至少4位房间号'); return; }
  roomId = newId;
  localStorage.setItem('diancai_room', roomId);
  updateURL();
  loadData();
  closeAdmin();
  showToast('房间已改为：' + roomId);
}

// ====== Toast ======
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ====== 启动 ======
initApp();
</script>
</body>
</html>
